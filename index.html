<!DOCTYPE html>
<html>
<head>
  <title>Freelancer Platform</title>
  <style>
    body { font-family: Arial; text-align: center; background:#f5f5f5; }
    .container { margin-top: 30px; background:white; padding:20px; border-radius:10px; display:inline-block; width:90%; max-width:400px; }
    input, button { padding:10px; margin:5px; width:90%; }
    button { background:#007bff; color:white; border:none; cursor:pointer; }
    .hidden { display:none; }
    .job { border:1px solid #ccc; margin:10px; padding:10px; border-radius:5px; }
  </style>
</head>
<body>

<div class="container" id="auth">
  <h2>Login / Sign Up</h2>
  <input type="text" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div class="container hidden" id="role">
  <h2>Who are you?</h2>
  <button onclick="selectRole('Freelancer')">Freelancer</button>
  <button onclick="selectRole('Employer')">Employer</button>
</div>

<div class="container hidden" id="dashboard">
  <h2 id="welcome"></h2>
  <div id="content"></div>
</div>

<script>
let users = JSON.parse(localStorage.getItem('users')) || [];
let jobs = JSON.parse(localStorage.getItem('jobs')) || [];
let currentUser = null;

function signup(){
  let email = document.getElementById('email').value;
  let password = document.getElementById('password').value;

  if(!email || !password){
    alert("Enter details");
    return;
  }

  users.push({email,password});
  localStorage.setItem('users', JSON.stringify(users));
  alert("Signup successful!");
}

function login(){
  let email = document.getElementById('email').value;
  let password = document.getElementById('password').value;

  let user = users.find(u=>u.email===email && u.password===password);

  if(user){
    currentUser = user;
    show('role');
  } else {
    alert("Invalid login");
  }
}

function selectRole(role){
  currentUser.role = role;
  localStorage.setItem('currentUser', JSON.stringify(currentUser));
  show('dashboard');
  loadDashboard();
}

function loadDashboard(){
  let content = document.getElementById('content');
  document.getElementById('welcome').innerText = "Welcome " + currentUser.email;

  if(currentUser.role === "Employer"){
    content.innerHTML = `
      <h3>Post Job</h3>
      <input id="jobTitle" placeholder="Job title"><br>
      <input id="jobBudget" placeholder="Budget"><br>
      <button onclick="postJob()">Post Job</button>
      <h3>Your Jobs</h3>
      <div id="jobList"></div>
    `;
    showJobs();
  } else {
    content.innerHTML = `
      <h3>Available Jobs</h3>
      <div id="jobList"></div>
    `;
    showJobs(true);
  }
}

function postJob(){
  let title = document.getElementById('jobTitle').value;
  let budget = document.getElementById('jobBudget').value;

  if(!title || !budget){
    alert("Fill all fields");
    return;
  }

  jobs.push({title, budget, employer: currentUser.email});
  localStorage.setItem('jobs', JSON.stringify(jobs));

  alert("Job posted!");
  showJobs();
}

function showJobs(isFreelancer=false){
  let jobList = document.getElementById('jobList');
  jobList.innerHTML = "";

  jobs.forEach((job, index)=>{
    let div = document.createElement('div');
    div.className = "job";
    div.innerHTML = `
      <b>${job.title}</b><br>
      Budget: ₹${job.budget}<br>
      ${isFreelancer ? <button onclick="applyJob(${index})">Apply</button> : ""}
    `;
    jobList.appendChild(div);
  });
}

function applyJob(index){
  alert("Applied to: " + jobs[index].title);
}

function show(id){
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('role').classList.add('hidden');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById(id).classList.remove('hidden');
}
</script>

</body>
</html>
