<!DOCTYPE html>
<html>
<head>
  <title>Freelancer Platform</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    .container {
      margin-top: 50px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, button {
      padding: 10px;
      margin: 5px;
      width: 220px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      cursor: pointer;
      background: #007bff;
      color: white;
      border: none;
    }

    button:hover {
      background: #0056b3;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<!-- LOGIN / SIGNUP -->
<div class="container" id="auth">
  <h2>Login / Sign Up</h2>
  <input type="text" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- ROLE SELECTION -->
<div class="container hidden" id="role">
  <h2>Who are you?</h2>
  <button onclick="selectRole('Freelancer')">Freelancer</button>
  <button onclick="selectRole('Employer')">Employer</button>
</div>

<!-- DASHBOARD -->
<div class="container hidden" id="dashboard">
  <h2 id="welcome"></h2>
  <p id="roleText"></p>
</div>

<script>
  let users = JSON.parse(localStorage.getItem('users')) || [];
  let currentUser = null;

  function signup() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    if (!email || !password) {
      alert("Please fill all fields");
      return;
    }

    users.push({ email, password });
    localStorage.setItem('users', JSON.stringify(users));

    alert('Signup successful! Now login.');
  }

  function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const user = users.find(u => u.email === email && u.password === password);

    if (user) {
      currentUser = user;
      document.getElementById('auth').classList.add('hidden');
      document.getElementById('role').classList.remove('hidden');
    } else {
      alert('Invalid email or password');
    }
  }

  function selectRole(role) {
    currentUser.role = role;
    localStorage.setItem('currentUser', JSON.stringify(currentUser));

    document.getElementById('role').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');

    document.getElementById('welcome').innerText = 'Welcome ' + currentUser.email;
    document.getElementById('roleText').innerText = 'Role: ' + role;
  }
</script>

</body>
</html>
