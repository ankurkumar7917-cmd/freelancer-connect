<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Verification | FreelancerConnect</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #10b981; --bg: #111827; --card: #1f2937; --error-red: #ef4444; }
        body { background-color: var(--bg); font-family: sans-serif; color: white; text-align: center; }
        .setup-card { background: var(--card); padding: 30px; border-radius: 15px; max-width: 450px; margin: 40px auto; border: 1px solid #374151; }
        
        input, select { 
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; 
            border: 1px solid #374151; background: #111827; color: white; 
            box-sizing: border-box; transition: all 0.3s ease;
        }

        /* Google Forms Style Highlight */
        input.error, select.error { 
            border: 2px solid var(--error-red) !important; 
            background: #2d1a1a !important; 
        }

        button { background: var(--primary); color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        #verify-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); color: var(--primary); justify-content: center; align-items: center; flex-direction: column; z-index: 100; }
        .loader { border: 4px solid #10b981; border-top: 4px solid transparent; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .error-text { color: var(--error-red); font-size: 0.8rem; display: none; text-align: left; margin-top: -5px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="verify-overlay">
        <div class="loader"></div>
        <h2 id="status-msg">VERIFYING BUSINESS DATA...</h2>
    </div>

    <h1>Trust & Safety Check</h1>
    <div class="setup-card">
        <form id="setupForm" novalidate>
            <input type="text" id="compName" placeholder="Registered Company Name">
            <input type="email" id="email" placeholder="Business Email">
            
            <select id="docType">
                <option value="GST">GSTIN (India)</option>
                <option value="PAN">Business PAN</option>
            </select>
            
            <input type="text" id="docNumber" placeholder="Enter ID Number">
            
            <label style="display:block; font-size: 0.8rem; color: #9ca3af; margin-top: 10px; text-align: left;">Upload Proof (PDF/JPG)</label>
            <input type="file" id="fileDoc" accept=".pdf,.jpg,.png">
            
            <button type="submit" id="submitBtn">ACTIVATE VERIFIED PROFILE</button>
        </form>
    </div>

    <script>
        // SUPABASE CONNECTION
        const supabaseUrl = 'https://gdmdqgxgzoifmdjukclp.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWRxZ3hnem9pZm1kanVrY2xwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDM4OTQsImV4cCI6MjA5MDYxOTg5NH0.pMvd3U3ni-fYiNBhM2mrK-AOJje-vlC91JWwWi02eVE';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // 1. Setup Validation
            const compName = document.getElementById('compName');
            const email = document.getElementById('email');
            const docNum = document.getElementById('docNumber');
            const fileInput = document.getElementById('fileDoc');
            const allInputs = [compName, email, docNum, fileInput];
            
            let firstEmpty = null;

            // 2. Clear previous errors and check for empty fields
            allInputs.forEach(input => {
                input.classList.remove('error');
                const isEmpty = (input.type === 'file') ? !input.files[0] : !input.value.trim();
                
                if (isEmpty) {
                    input.classList.add('error');
                    if (!firstEmpty) firstEmpty = input;
                }
            });

            // 3. If something is missing, jump to that box and stop
            if (firstEmpty) {
                firstEmpty.focus();
                return;
            }

            // 4. Everything is filled - Start Upload
            document.getElementById('verify-overlay').style.display = 'flex';
            const file = fileInput.files[0];

            try {
                // Upload File - Fixed backtick syntax error here
                const fileName = ${Date.now()}_${file.name};
                
                const { error: uploadError } = await _supabase.storage
                    .from('verification-docs')
                    .upload(fileName, file);
                
                if (uploadError) throw new Error("Storage Error: " + uploadError.message);

                // Save Database Row
                const { error: dbError } = await _supabase
                    .from('clients')
                    .insert([{ 
                        company_name: compName.value, 
                        gst_number: docNum.value, 
                        email: email.value,
                        doc_type: document.getElementById('docType').value,
                        document_url: fileName,
                        is_verified: false 
                    }]);

                if (dbError) throw new Error("Database Error: " + dbError.message);

                // SUCCESS
                document.getElementById('status-msg').innerText = "VERIFIED!";
                setTimeout(() => { window.location.href = "index.html"; }, 2000);

            } catch (err) {
                alert("Error: " + err.message);
                document.getElementById('verify-overlay').style.display = 'none';
            }
        });
    </script>
</body>
</html>
