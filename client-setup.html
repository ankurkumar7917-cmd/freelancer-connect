<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Verification | FreelancerHub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #10b981; --bg: #020617; --card: rgba(255, 255, 255, 0.03); }
        body { background-color: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; text-align: center; margin: 0; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .setup-card { background: var(--card); backdrop-filter: blur(15px); padding: 40px; border-radius: 24px; max-width: 450px; margin: 20px auto; border: 1px solid rgba(255,255,255,0.1); }
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; }
        p.subtitle { color: #9ca3af; margin-bottom: 30px; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; outline: none; }
        button { background: var(--primary); color: white; padding: 16px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; font-size: 1rem; }
        #verify-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(2, 6, 23, 0.95); color: var(--primary); justify-content: center; align-items: center; flex-direction: column; z-index: 100; }
        .loader { border: 4px solid #10b981; border-top: 4px solid transparent; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        label { display:block; font-size: 0.8rem; color: #9ca3af; margin-top: 15px; text-align: left; }
    </style>
</head>
<body>

    <div id="verify-overlay">
        <div class="loader"></div>
        <h2 id="status-msg">VERIFYING DATA...</h2>
    </div>

    <h1>Trust & Safety</h1>
    <p class="subtitle">Complete your business profile to start hiring.</p>

    <div class="setup-card">
        <form id="setupForm">
            <input type="text" id="compName" placeholder="Registered Company Name" required>
            <input type="email" id="email" placeholder="Business Email" required>
            
            <select id="docType">
                <option value="GST">GSTIN (India)</option>
                <option value="PAN">Business PAN</option>
            </select>
            
            <input type="text" id="docNumber" placeholder="Enter ID Number" required>
            
            <label>Upload Verification Proof (PDF/JPG)</label>
            <input type="file" id="fileDoc" accept=".pdf,.jpg,.png" required>
            
            <button type="submit" id="submitBtn">ACTIVATE PROFILE</button>
        </form>
    </div>

    <script>
        // Use your specific Supabase credentials
        const supabaseUrl = 'https://gdmdqgxgzoifmdjukclp.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWRxZ3hnem9pZm1kanVrY2xwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDM4OTQsImV4cCI6MjA5MDYxOTg5NH0.pMvd3U3ni-fYiNBhM2mrK-AOJje-vlC91JWwWi02eVE';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const compName = document.getElementById('compName').value;
            const email = document.getElementById('email').value;
            const docNum = document.getElementById('docNumber').value;
            const docType = document.getElementById('docType').value;
            const fileInput = document.getElementById('fileDoc');
            
            if (!fileInput.files[0]) {
                alert("Please upload a document.");
                return;
            }

            document.getElementById('verify-overlay').style.display = 'flex';
            
            const file = fileInput.files[0];
            const fileName = Date.now() + "_" + file.name;

            try {
                // 1. Upload to Storage
                const { error: uploadError } = await _supabase.storage
                    .from('verification-docs')
                    .upload(fileName, file);
                
                if (uploadError) throw uploadError;

                // 2. Save to Database
                const { error: dbError } = await _supabase
                    .from('clients')
                    .insert([{ 
                        company_name: compName, 
                        gst_number: docNum, 
                        email: email,
                        doc_type: docType,
                        document_url: fileName,
                        is_verified: false 
                    }]);

                if (dbError) throw dbError;

                document.getElementById('status-msg').innerText = "SUCCESS! REDIRECTING...";
                setTimeout(() => { 
                    window.location.href = "index.html"; 
                }, 2000);

            } catch (err) {
                alert("Error: " + err.message);
                document.getElementById('verify-overlay').style.display = 'none';
            }
        });
    </script>
</body>
</html>
