<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Verification | FreelancerConnect</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #10b981; --bg: #111827; --card: #1f2937; }
        body { background-color: var(--bg); font-family: sans-serif; color: white; text-align: center; }
        .setup-card { background: var(--card); padding: 30px; border-radius: 15px; max-width: 450px; margin: 40px auto; border: 1px solid #374151; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #374151; background: #111827; color: white; box-sizing: border-box; }
        button { background: var(--primary); color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        #verify-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); color: var(--primary); justify-content: center; align-items: center; flex-direction: column; z-index: 100; }
        .loader { border: 4px solid #10b981; border-top: 4px solid transparent; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="verify-overlay">
        <div class="loader"></div>
        <h2 id="status-msg">VERIFYING BUSINESS DATA...</h2>
    </div>

    <h1>Trust & Safety Check</h1>
    <div class="setup-card">
        <form id="setupForm">
            <input type="text" id="compName" placeholder="Registered Company Name" required>
            <input type="email" id="email" placeholder="Business Email" required>
            <select id="docType">
                <option value="GST">GSTIN (India)</option>
                <option value="PAN">Business PAN</option>
            </select>
            <input type="text" id="docNumber" placeholder="Enter ID Number" required>
            <label style="display:block; font-size: 0.8rem; color: #9ca3af; margin-top: 10px;">Upload Proof (PDF/JPG)</label>
            <input type="file" id="fileDoc" accept=".pdf,.jpg,.png" required>
            <button type="submit">ACTIVATE VERIFIED PROFILE</button>
        </form>
    </div>

    <script>
        // YOUR INTEGRATED KEYS
        const supabaseUrl = 'https://gdmdqgxgzoifmdjukclp.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWRxZ3hnem9pZm1kanVrY2xwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDM4OTQsImV4cCI6MjA5MDYxOTg5NH0.pMvd3U3ni-fYiNBhM2mrK-AOJje-vlC91JWwWi02eVE';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('verify-overlay').style.display = 'flex';

            const file = document.getElementById('fileDoc').files[0];
            const compName = document.getElementById('compName').value;
            const docNum = document.getElementById('docNumber').value;
            const email = document.getElementById('email').value;
            const docType = document.getElementById('docType').value;

            try {
                // 1. Upload File
                const fileName = ${Date.now()}_${file.name};
                const { error: uploadError } = await _supabase.storage
                    .from('verification-docs')
                    .upload(fileName, file);
                if (uploadError) throw uploadError;

                // 2. Save Data
                const { error: dbError } = await _supabase
                    .from('clients')
                    .insert([{ 
                        company_name: compName, 
                        gst_number: docNum, 
                        email: email,
                        doc_type: docType,
                        document_url: fileName,
                        is_verified: false 
                    }]);
                if (dbError) throw dbError;

                document.getElementById('status-msg').innerText = "VERIFIED!";
                setTimeout(() => { window.location.href = "index.html"; }, 2000);

            } catch (err) {
                alert("Error: " + err.message);
                document.getElementById('verify-overlay').style.display = 'none';
            }
        });
    </script>
</body>
</html>
