<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Setup | FreelancerHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background: #020617; color: white; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                        radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%);
            z-index: -1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input, select, textarea {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            transition: all 0.3s ease;
        }
        input:focus, select:focus, textarea:focus { 
            border-color: #6366f1 !important; 
            background: rgba(255, 255, 255, 0.08) !important;
            outline: none; 
        }
        .section-label {
            color: #6366f1; font-weight: 800; text-transform: uppercase; 
            font-size: 0.75rem; letter-spacing: 0.1em; margin-bottom: 1.5rem; display: block;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start px-6 py-16">
    <div class="mesh-bg"></div>

    <div class="max-w-4xl w-full">
        <header class="text-center mb-16">
            <h1 class="text-5xl font-extrabold mb-4 tracking-tighter">Professional Onboarding</h1>
            <p class="text-gray-400 text-lg">Build a profile that stands out to high-paying clients.</p>
        </header>

        <form class="glass-card p-10 md:p-14 rounded-[3rem] space-y-12">
            
            <section>
                <span class="section-label">01. Identity & Bio</span>
                <div class="grid md:grid-cols-2 gap-8 mb-6">
                    <div class="space-y-2">
                        <label class="text-sm text-gray-400 ml-1">Full Name</label>
                        <input type="text" placeholder="John Doe" class="w-full px-6 py-4 rounded-2xl">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm text-gray-400 ml-1">Professional Headline</label>
                        <input type="text" placeholder="Full Stack Developer | AI Specialist" class="w-full px-6 py-4 rounded-2xl">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-sm text-gray-400 ml-1">Professional Summary</label>
                    <textarea placeholder="Tell clients about your unique value..." class="w-full px-6 py-4 rounded-2xl h-32 resize-none"></textarea>
                </div>
            </section>

            <section>
                <span class="section-label">02. Expertise & Proof</span>
                <div class="grid md:grid-cols-2 gap-8 mb-6">
                    <div class="space-y-2">
                        <label class="text-sm text-gray-400 ml-1">Primary Skill Tags</label>
                        <input type="text" placeholder="React, Python, Figma" class="w-full px-6 py-4 rounded-2xl">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm text-gray-400 ml-1">Years of Experience</label>
                        <select class="w-full px-6 py-4 rounded-2xl appearance-none">
                            <option>1-3 Years</option>
                            <option>3-7 Years</option>
                            <option>7-10 Years</option>
                            <option>10+ Years (Expert)</option>
                        </select>
                    </div>
                </div>
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="space-y-2">
                        <label class="text-sm text-gray-400 ml-1">Portfolio/Website Link</label>
                        <input type="url" placeholder="https://yourwork.com" class="w-full px-6 py-4 rounded-2xl">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm text-gray-400 ml-1">Resume / CV (Upload)</label>
                        <input type="file" class="w-full px-6 py-3 rounded-2xl text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500">
                    </div>
                </div>
            </section>

            <section class="bg-white/5 p-8 rounded-[2.5rem] border border-white/5">
                <span class="section-label text-indigo-300">03. Availability & Rates</span>
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="space-y-2">
                        <label class="text-sm text-gray-400 ml-1">Hourly Rate (USD)</label>
                        <div class="relative">
                            <span class="absolute left-6 top-4 text-gray-500">$</span>
                            <input type="number" placeholder="50" class="w-full pl-10 pr-6 py-4 rounded-2xl">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm text-gray-400 ml-1">Weekly Capacity</label>
                        <select class="w-full px-6 py-4 rounded-2xl appearance-none">
                            <option>Full-time (40h/week)</option>
                            <option>Part-time (20h/week)</option>
                            <option>Available for One-off Tasks</option>
                        </select>
                    </div>
                </div>
            </section>

            <section>
                <span class="section-label">04. Contact & Communication</span>
                <div class="grid md:grid-cols-2 gap-8 mb-6">
                    <div class="space-y-2">
                        <label class="text-sm text-gray-400 ml-1">Email Address</label>
                        <input type="email" placeholder="hello@yoursite.com" class="w-full px-6 py-4 rounded-2xl">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm text-gray-400 ml-1">WhatsApp / Phone</label>
                        <input type="tel" placeholder="+1 000 000 000" class="w-full px-6 py-4 rounded-2xl">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-sm text-gray-400 ml-1">Preferred Timezone</label>
                    <select class="w-full px-6 py-4 rounded-2xl appearance-none">
                        <option>GMT / UTC (London)</option>
                        <option>EST (New York / Miami)</option>
                        <option>PST (Los Angeles / SF)</option>
                        <option>IST (New Delhi)</option>
                        <option>JST (Tokyo)</option>
                    </select>
                </div>
            </section>

            <div class="pt-6">
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-5 rounded-full font-extrabold text-xl transition-all shadow-xl shadow-indigo-600/30 transform hover:-translate-y-1 active:scale-[0.98]">
                    Finalize My Profile
                </button>
                <p class="text-center text-gray-600 text-sm mt-6">
                    <i class="fas fa-shield-alt mr-2"></i> Your data is secured and will be used for hiring matches.
                </p>
            </div>
        </form>
    </div>
</body>
</html>
