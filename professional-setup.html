<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Setup | FreelancerHub India</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background: #020617; color: white; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                        radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%);
            z-index: -1;
        }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input, select, textarea {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        select option { background-color: #0f172a; color: white; }
        input:focus, select:focus, textarea:focus { border-color: #6366f1 !important; outline: none; }
        .section-tag { color: #6366f1; font-weight: 800; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.2em; margin-bottom: 1rem; display: block; }
    </style>
</head>
<body class="flex flex-col items-center justify-start px-6 py-12">
    <div class="mesh-bg"></div>

    <div class="max-w-3xl w-full">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-extrabold mb-2 tracking-tighter">Join the Elite.</h1>
            <p class="text-gray-400">Complete your profile to start receiving Indian & International leads.</p>
        </header>

        <form class="glass-card p-8 md:p-10 rounded-[2.5rem] space-y-10">
            
            <section>
                <span class="section-tag">01. Professional Info</span>
                <div class="grid md:grid-cols-2 gap-5 mb-5">
                    <input type="text" placeholder="Full Name" class="w-full px-5 py-4 rounded-2xl">
                    <input type="text" placeholder="Job Title (e.g. Content Writer)" class="w-full px-5 py-4 rounded-2xl">
                </div>
                <div class="grid md:grid-cols-2 gap-5 mb-5">
                    <select class="w-full px-5 py-4 rounded-2xl">
                        <option value="" disabled selected>Select Your State</option>
                        <option>Maharashtra</option><option>Delhi</option><option>Karnataka</option>
                        <option>Tamil Nadu</option><option>Telangana</option><option>Gujarat</option>
                        <option>Uttar Pradesh</option><option>West Bengal</option><option>Other</option>
                    </select>
                    <input type="text" placeholder="City (e.g. Mumbai, Bangalore)" class="w-full px-5 py-4 rounded-2xl">
                </div>
                <textarea placeholder="Briefly describe your expertise..." class="w-full px-5 py-4 rounded-2xl h-24 resize-none"></textarea>
            </section>

            <section>
                <span class="section-tag">02. Availability & Skills</span>
                <div class="grid md:grid-cols-2 gap-5 mb-5">
                    <select class="w-full px-5 py-4 rounded-2xl">
                        <option value="" disabled selected>Experience Level</option>
                        <option>Fresher</option><option>1-3 Years</option><option>3-5 Years</option><option>5+ Years (Expert)</option>
                    </select>
                    <select class="w-full px-5 py-4 rounded-2xl">
                        <option value="" disabled selected>Work Preferences</option>
                        <option>Indian Clients Only (IST)</option>
                        <option>International Overlap (US/UK)</option>
                        <option>Flexible / Night Shifts</option>
                    </select>
                </div>
                <input type="text" placeholder="Key Skills (e.g. SEO, Java, Tally, Canva)" class="w-full px-5 py-4 rounded-2xl">
            </section>

            <section class="bg-indigo-600/5 p-6 rounded-[2rem] border border-indigo-500/10">
                <span class="section-tag">03. Pricing & Payouts</span>
                <div class="grid md:grid-cols-2 gap-5">
                    <div class="relative">
                        <span class="absolute left-5 top-4 text-gray-500">₹</span>
                        <input type="number" placeholder="Hourly Rate (INR)" class="w-full pl-10 pr-5 py-4 rounded-2xl">
                    </div>
                    <select class="w-full px-5 py-4 rounded-2xl">
                        <option value="" disabled selected>Preferred Payment</option>
                        <option>UPI (GPay/PhonePe)</option>
                        <option>Direct Bank Transfer</option>
                        <option>PayPal (For International)</option>
                    </select>
                </div>
            </section>

            <section>
                <span class="section-tag">04. Verification</span>
                <div class="grid md:grid-cols-2 gap-5">
                    <input type="email" placeholder="Email Address" class="w-full px-5 py-4 rounded-2xl">
                    <input type="tel" placeholder="WhatsApp Number" class="w-full px-5 py-4 rounded-2xl">
                </div>
            </section>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-5 rounded-full font-extrabold text-xl transition-all shadow-xl shadow-indigo-600/30">
                Create My Profile
            </button>
        </form>
    </div>
</body>
</html>
